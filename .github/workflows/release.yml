name: Create Chrome Extension Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'New version number (e.g., 1.0.2) - do not include the v'
        required: true
        type: string

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write 

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5
        with:
          # Dynamically check out the branch triggered in the UI, or fallback to main for tags
          ref: ${{ github.event_name == 'workflow_dispatch' && github.ref_name || 'main' }}
          fetch-depth: 0 

      - name: Determine Version and Tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "NEW_VERSION=${{ github.event.inputs.version }}" >> $GITHUB_ENV
            echo "RELEASE_TAG=v${{ github.event.inputs.version }}" >> $GITHUB_ENV
          else
            echo "NEW_VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV
            echo "RELEASE_TAG=$GITHUB_REF_NAME" >> $GITHUB_ENV
          fi

      - name: Auto-Increment, Commit, and Move Tag
        run: |
          jq --arg ver "${{ env.NEW_VERSION }}" '.version = $ver' public/manifest.json > tmp.json && mv tmp.json public/manifest.json
          
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add public/manifest.json
          
          if git diff --staged --quiet; then
            echo "Version in manifest is already up to date. Skipping commit."
          else
            git commit -m "chore: bump version to ${{ env.NEW_VERSION }} [skip ci]"
            # Dynamically push back to the branch that triggered the workflow
            git push origin ${{ github.event_name == 'workflow_dispatch' && github.ref_name || 'main' }}
          fi
          
          git tag -f ${{ env.RELEASE_TAG }}
          git push origin ${{ env.RELEASE_TAG }} --force

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24.x'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Project
        run: npm run build

      - name: Prepare Filename
        run: |
          RAW_NAME=$(jq -r '.name' public/manifest.json)
          CLEAN_NAME="${RAW_NAME// /_}"
          echo "FILENAME=${CLEAN_NAME}_v${{ env.NEW_VERSION }}.zip" >> $GITHUB_ENV

      - name: Create Zip of dist/
        run: |
          cd dist && zip -r "../${{ env.FILENAME }}" .

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ env.RELEASE_TAG }} "${{ env.FILENAME }}" \
            --title "Release ${{ env.RELEASE_TAG }}" \
            --generate-notes